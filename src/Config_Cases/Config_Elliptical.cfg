&InitialSettings
!========== Model Settings ==========
                    ModelType   =       3,    ! 1: 2.5D 
                                              ! 2: 3D Model with singular line, using the spherical coordinate system 
                                              ! 3: Elliptical cone
                                              ! 4: Hifire5b                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         


!========== Analysis Settings =======
                    AnalysisType=       1,    ! 1: Steady NS Solver
                                              ! 2: Unsteady NS Solver
                                              ! 3: LNS Solver
                                              ! 4: HLNS Solver
!==========   Grid Settings   ==========
         Geometry_Type          =       1,    ! Geometric selection(1:Round; 2:parabola)

                    Nx          =      90,    ! Total grid along Xi
                           
                    Nx_head     =      40,    ! Grid along round head
                           
                    Ny          =      41,    ! Total grid along eta directions

                    Nz          =      40,    ! Total grid along Zeta directions                  
                           
                    xim         =   0.2d0,    ! Compress parameters (0,0.5)                       

                    sigma_y     =  0.75d0,    ! The first compress coefficient 

                    yim         =   0.1d0,    ! The second compress coefficient

                    Lz_start    =    0.d0,    ! Start position of the z direction

                    Lz_end      =    0.d0,    ! End position of the z direction

                    R_head      =  0.0125,    ! Radius of the head
                   
                    LModel      =    1.d0,    ! length of the model

                    theta_p_deg =    0.d0,    ! flate wall angle  

!==========   Perturbation  Settings   ==========      !

                    Pert_Type  =  1           !(1:fast;2,slow)

                    k_infty    =  15          ! wave number in x direction

                    epsilon    =  5e-4        ! perturbation amplitude

               LNS_STEPS_MAX   =  50000000    ! maximum steps for LNS calculation

                     LNS_dt    =  2.0e-5      ! time step for LNS calculation

            IF_Continue_LNS    =  0           ! Continue LNS Calculation = 1
                                              ! New LNS Calculation = 0

!==========   CFD  Settings   ==========      !
!
                    AoA_Deg     =    0.d0,    ! angle of attack in degree
                     
                    AoS_Deg     =    0.d0,    ! angle of sweep in degree
                     
                    Re_Ref      =   60266,    ! reference Reynolds number          

                    Te_Ref      = 5980.d0,    ! reference Temperature
                    
                    Mach_Ref    =   15.d0,    ! reference Mach numbers
                     
                    Pr_Ref      =    0.72,    ! reference Prandtl number

                    Gamma       =     1.4,     ! specific ratio of heat
                                             
                    TWall       =0.167224,    ! Surface temperature ratio Twall/Te_Ref
                                              ! Surface adiabatic wall: TWall = -1.d0    

!========== Parallel Settings ==========
                                                   
                    npx0        =       1,    ! Number of processors in x-direction

                    npz0        =       1,    ! Number of processors in y-direction

!========== Temporal Settings  ==========
!
!     Continue Calculation = 1
!          New Calculation = 0
!
           IF_Continue_Calculate  =       0,  ! Calculation Mode
!                                  50000001,  ! Default: 50000001
           TotalTimeSteps         =50000001,  ! Total Time Steps for simulations

           StepsOutputScreen      =      20,  ! Steps to output residuals on screen

           StepsWriteData         =    2000,  ! Steps to output the transient results

           StepChangeCFLStart     =    2000,  ! Initial calculation steps for CFL_Start

           StepChangeCFL          =    2000,  ! CFL changes for CFL_Start to CFL_End
  
           CFL_Start              =     0.3,  ! Initial CFL numbers

           CFL_End                =     1.0,  ! CFL end for changes (suggest 2~3 for DPLR)
          
         IF_FixedDeltaTime       =        0,  ! Fixed time step mode

            FixedDeltaTime       =     6e-6,  ! Fixed time step size
! 
!==========  Temporal Schemes  ========== 
!      
!              RK4_Methods = 1
!             DPLR_Methods = 2
!            GMRES_Methods = 3
!         MultiGridMethods = 4
!

    Select_Kind_Solver     =  1,

!
!====   Precondition Solver   =========== 
!               No_precond = 0
!             DPLR_precond = 1
!         MultGrid_precond = 2
!   

 Select_Kind_Precon_Solver = 0,

!
!====  Select Spatial Scheme  ===========
!           first_order = 1_ik
!           fifth_order = 5_ik
!           weno5_order = 6_ik
!           hybird_sch  = 7_ik

             Select_Scheme = 5,

!==========  Output  Settings  ==========
! Output Residual Mode(1.Brief;2.Detail)         
      Output_Residual_Mode = 1,
/
